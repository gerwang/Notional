name: Release Obsidian plugin

# Tag a commit with the exact manifest.json version (no leading "v"), push it,
# and this builds the plugin and drafts a GitHub release with the three assets
# Obsidian/BRAT need: main.js, manifest.json, styles.css.
on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+*"

permissions:
  contents: write
  # Required to generate build-provenance attestations for the release assets.
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20.x"

      - name: Install, verify, and build
        run: |
          npm ci
          npm run lint
          npm run lint:obsidian
          npm test
          npm run build

      - name: Attest build provenance for release assets
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: |
            main.js
            manifest.json
            styles.css

      - name: Draft GitHub release with plugin assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ github.ref_name }}
        run: |
          # A hyphen in the tag (e.g. 1.1.0-beta.1) marks a pre-release.
          prerelease=""
          if [[ "$tag" == *-* ]]; then prerelease="--prerelease"; fi
          gh release create "$tag" \
            --title="$tag" \
            --draft \
            $prerelease \
            --generate-notes \
            main.js manifest.json styles.css
