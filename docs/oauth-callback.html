<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="robots" content="noindex" />
		<title>Connecting Notional to Notion…</title>
		<!--
			Notional OAuth redirect page.

			Privacy: this page runs entirely in your browser. It makes no network
			requests, loads no third-party scripts, fonts, or analytics, and stores
			nothing. It only reads the authorization code Notion put in this page's
			URL and hands it to the Obsidian app via the obsidian:// protocol. The
			code is useless without the PKCE verifier, which never left your device.
		-->
		<style>
			body {
				font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
					Helvetica, Arial, sans-serif;
				background: #1e1e1e;
				color: #dcddde;
				display: flex;
				min-height: 100vh;
				margin: 0;
				align-items: center;
				justify-content: center;
				text-align: center;
			}
			main {
				max-width: 32rem;
				padding: 2rem;
			}
			h1 {
				font-size: 1.3rem;
			}
			a.button {
				display: inline-block;
				margin-top: 1rem;
				padding: 0.6rem 1.2rem;
				background: #7c3aed;
				color: #fff;
				border-radius: 6px;
				text-decoration: none;
				font-weight: 600;
			}
			code {
				display: block;
				margin-top: 1.5rem;
				padding: 0.75rem;
				background: #2a2a2a;
				border-radius: 6px;
				word-break: break-all;
				font-size: 0.8rem;
				color: #9aa0aa;
			}
			.muted {
				color: #9aa0aa;
				font-size: 0.9rem;
			}
		</style>
	</head>
	<body>
		<main>
			<h1 id="heading">Returning you to Obsidian…</h1>
			<p class="muted" id="detail">
				If Obsidian doesn't reopen automatically, click the button below.
			</p>
			<a class="button" id="return" href="#">Open Obsidian</a>
			<p class="muted">
				Or paste this URL into Notional's “Finish manually” field:
			</p>
			<code id="callback"></code>
		</main>
		<script>
			(function () {
				// Forward Notion's callback params (code, state, error) verbatim
				// to the Obsidian app. No data is sent anywhere else.
				var search = window.location.search || "";
				var target = "obsidian://notional-oauth" + search;

				var returnLink = document.getElementById("return");
				returnLink.setAttribute("href", target);
				document.getElementById("callback").textContent = target;

				var params = new URLSearchParams(search);
				if (params.get("error")) {
					document.getElementById("heading").textContent =
						"Notion authorization was declined";
					document.getElementById("detail").textContent =
						"You can close this tab and try connecting again from Obsidian.";
				}

				// Attempt the hand-off automatically.
				window.location.href = target;
			})();
		</script>
	</body>
</html>
